name: PERKESO IC Checker

on:
  workflow_run:
    workflows: ["PERKESO IC Checker"]
    types: [completed]
  schedule:
    - cron: '0 * * * *'   # hourly fallback if chain breaks
  workflow_dispatch:
    inputs:
      mode:
        description: '1=Adaptive random (recommended)  4=Systematic A-Z'
        default: '1'
      runtime_minutes:
        description: 'Minutes to scan per job'
        default: '22'
      from_year:
        description: 'Birth year from'
        default: '1965'
      to_year:
        description: 'Birth year to'
        default: '2000'

concurrency:
  group: perkeso-checker
  cancel-in-progress: false

jobs:
  run-checker:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    permissions:
      contents: write

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rest between chained runs
        if: github.event_name == 'workflow_run'
        run: |
          echo "Resting 120s before next batch..."
          sleep 120

      - name: Run IC Checker
        run: |
          python ic_checker.py \
            --mode "${{ github.event.inputs.mode || '1' }}" \
            --workers 3 \
            --from-year "${{ github.event.inputs.from_year || '1965' }}" \
            --to-year   "${{ github.event.inputs.to_year   || '2000' }}" \
            --max-runtime "${{ github.event.inputs.runtime_minutes || '22' }}"

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add ic_results/master_valid.json \
                  ic_results/master_invalid.json \
                  ic_results/master_progress.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            VALID=$(python -c "import json,os; f='ic_results/master_valid.json'; print(len(json.load(open(f))) if os.path.exists(f) else 0)" 2>/dev/null || echo "?")
            PCT=$(python -c "import json,os; f='ic_results/master_progress.json'; p=json.load(open(f)) if os.path.exists(f) else {}; slots=p.get('dob_states_completed',0); print(f'{slots/724155*100:.3f}%')" 2>/dev/null || echo "?")
            git commit -m "scan $(date -u +'%Y-%m-%d %H:%M UTC') | valid: ${VALID} | coverage: ${PCT}"
            git push
          fi
